# Dokploy/Nixpacks builds the static site, then the Procfile release process
# uploads the prebuilt dist directory to Cloudflare Workers with Wrangler.
providers = ['node']


[phases.install]
cmds = ['NPM_CONFIG_REGISTRY="${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}" pnpm install --frozen-lockfile --prod=false']

[phases.build]
cmds = ['pnpm run build']
cacheDirectories = ['...', 'node_modules/.astro', '.astro', 'node_modules/.cache']
